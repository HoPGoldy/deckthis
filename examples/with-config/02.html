<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assets & beforeEach</title>
</head>

<body>
  <div class="slide">
    <h1>全局样式注入</h1>
    <p>通过 <code>assets</code> 托管 CSS 文件，再用 <code>beforeEach</code> 向每张幻灯片注入 <code>&lt;link&gt;</code>。</p>
    <p>无需在每个 HTML 里手动写 <code>&lt;link&gt;</code>。</p>
  </div>
</body>

</html>
